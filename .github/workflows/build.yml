name: Build iOS IPA

on:
  push:
    branches: [ios-dev]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ios-dev
      
      - name: Set up Xcode
        run: sudo xcode-select --switch /Applications/Xcode.app
      
      - name: Build Archive
        run: |
          cd ios
          xcodebuild -scheme "KataGo iOS" \
            -configuration Release \
            -derivedDataPath build \
            -archivePath build/KataGo.xcarchive \
            archive
      
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/KataGo.xcarchive \
            -exportPath build/IPA \
            -exportOptionsPlist ExportOptions.plist
      
      - name: Upload IPA
        uses: actions/upload-artifact@v3
        with:
          name: KataGo.ipa
          path: build/IPA/KataGo.ipa
