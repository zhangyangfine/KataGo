name: Build
on:
  push:
    paths:
      - 'cpp/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  xcodebuild:
    runs-on: macos-15
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Xcode build
      run: |
        cd cpp/xcode
        xcodebuild -derivedDataPath DerivedData -scheme katago -configuration Debug build

    - name: Setup configuration
      run: |
        ln -s ../../../../../configs/misc/coreml_example.cfg cpp/xcode/DerivedData/Build/Products/Debug/gtp.cfg
        ln -s ../../../../../configs/misc/metal_gtp.cfg cpp/xcode/DerivedData/Build/Products/Debug/metal_gtp.cfg

    - name: Setup network
      run: |
        mkdir -p models
        cd models
        wget https://github.com/ChinChangYang/KataGo/releases/download/v1.15.1-coreml2/kata1-b18c384nbt-s9996604416-d4316597426.bin.gz
        ln -s ../../../../../../models/kata1-b18c384nbt-s9996604416-d4316597426.bin.gz ../cpp/xcode/DerivedData/Build/Products/Debug/model.bin.gz

    - name: Setup network of version 8
      run: |
        mkdir -p models
        cd models
        wget https://github.com/lightvector/KataGo/releases/download/v1.4.5/g170-b40c256x2-s5095420928-d1229425124.bin.gz
        ln -s ../../../../../../models/g170-b40c256x2-s5095420928-d1229425124.bin.gz ../cpp/xcode/DerivedData/Build/Products/Debug/modelv8.bin.gz

    - name: Setup test data
      run: |
        ln -s ../../../../../tests cpp/xcode/DerivedData/Build/Products/Debug/tests

    - name: Run Xcode test
      run: |
        cd cpp/xcode
        xcodebuild -derivedDataPath DerivedData -scheme katago -configuration Debug test

    - name: Run KataGo tests
      run: |
        cd cpp/xcode/DerivedData/Build/Products/Debug
        # ./katago runnnlayertests
        ./katago runoutputtests
        ./katago runnnontinyboardtest model.bin.gz false false 0 false
        ./katago runnnsymmetriestest model.bin.gz false false false
        ./katago runownershiptests gtp.cfg model.bin.gz

  cmake-macos:
    runs-on: macos-15
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup ninja
      run: |
        brew install ninja

    - name: Setup Eigen
      run: |
        brew install eigen

    - name: Show Xcode version
      run: |
        xcode-select -p
        xcodebuild -version

    - name: Build KataGo with Eigen backend
      run: |
        mkdir -p cpp/build
        cd cpp/build
        cmake --version
        cmake -G Ninja -DUSE_BACKEND=EIGEN ../
        ninja

    - name: Setup network
      run: |
        mkdir -p models
        cd models
        wget https://github.com/ChinChangYang/KataGo/releases/download/v1.15.1-coreml2/kata1-b18c384nbt-s9996604416-d4316597426.bin.gz
        ln -s ../../models/kata1-b18c384nbt-s9996604416-d4316597426.bin.gz ../cpp/build/model.bin.gz

    - name: Run KataGo GPU error test with Eigen backend
      run: |
        cd cpp/build
        ./katago testgpuerror -config ../configs/gtp_example.cfg -model model.bin.gz -boardsize 9 -reference-file base.bin

    - name: Setup human SL network
      run: |
        mkdir -p models
        cd models
        wget https://github.com/lightvector/KataGo/releases/download/v1.15.0/b18c384nbt-humanv0.bin.gz
        ln -s ../../models/b18c384nbt-humanv0.bin.gz ../cpp/build/b18c384nbt-humanv0.bin.gz

    - name: Run KataGo GPU error test of human SL network with Eigen backend
      run: |
        cd cpp/build
        ./katago testgpuerror -config ../configs/misc/gtp_human5k_coreml.cfg -model b18c384nbt-humanv0.bin.gz -boardsize 9 -reference-file base-humanv0.bin

    - name: Setup test data
      run: |
        ln -s ../tests cpp/build/tests

    - name: Run KataGo tests
      run: |
        cd cpp/build
        # ./katago runnnlayertests
        ./katago runoutputtests
        ./katago runnnontinyboardtest model.bin.gz false false 0 false
        ./katago runnnsymmetriestest model.bin.gz false false false
        ./katago runownershiptests gtp.cfg model.bin.gz

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential zlib1g-dev libzip-dev opencl-headers ocl-icd-opencl-dev

    - name: Cache CMake build
      uses: actions/cache@v4
      with:
        path: |
          cpp/CMakeCache.txt
          cpp/CMakeFiles
        key: ${{ runner.os }}-cmake-${{ hashFiles('**/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-cmake-

    - name: Configure CMake
      working-directory: cpp
      run: |
        cmake . -DUSE_BACKEND=OPENCL -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_FLAGS_RELEASE="-s"

    - name: Build
      working-directory: cpp
      run: |
        make -j$(nproc)

    - name: Run tests
      working-directory: cpp
      run: |
        ./katago runtests

    - name: Upload artifact
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: actions/upload-artifact@v4
      with:
        name: katago-linux-opencl
        path: cpp/katago

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install zlib libzip opencl-headers
      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: |
            cpp/CMakeCache.txt
            cpp/CMakeFiles
            cpp/build.ninja
            cpp/.ninja_deps
            cpp/.ninja_log
          key: ${{ runner.os }}-cmake-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-cmake-
      - name: Configure CMake
        working-directory: cpp
        run: |
          cmake . -G Ninja -DUSE_BACKEND=OPENCL -DCMAKE_BUILD_TYPE=Release
      - name: Build
        working-directory: cpp
        run: |
          ninja
      - name: Run tests
        working-directory: cpp
        run: |
          ./katago runtests
      - name: Upload artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: katago-macos-opencl
          path: cpp/katago

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSVC
      uses: microsoft/setup-msbuild@v2

    - name: Cache vcpkg packages
      uses: actions/cache@v4
      with:
        path: |
          ${{ env.VCPKG_INSTALLATION_ROOT }}/installed
          ${{ env.VCPKG_INSTALLATION_ROOT }}/packages
        key: ${{ runner.os }}-vcpkg-${{ hashFiles('**/vcpkg.json') }}-opencl
        restore-keys: |
          ${{ runner.os }}-vcpkg-

    - name: Install vcpkg dependencies
      run: |
        vcpkg install zlib:x64-windows libzip:x64-windows opencl:x64-windows

    - name: Configure CMake
      working-directory: cpp
      run: |
        cmake . -G "Visual Studio 17 2022" -A x64 `
          -DUSE_BACKEND=OPENCL `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

    - name: Build
      working-directory: cpp
      run: |
        cmake --build . --config Release -j 4

    - name: Copy required DLLs
      working-directory: cpp
      run: |
        $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
        Copy-Item "$vcpkgRoot/installed/x64-windows/bin/*.dll" -Destination "Release/"

    - name: Run tests
      working-directory: cpp
      run: |
        Release/katago.exe runtests

    - name: Upload artifact
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: actions/upload-artifact@v4
      with:
        name: katago-windows-opencl
        path: cpp/Release/
